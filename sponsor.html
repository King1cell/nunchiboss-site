<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후원하기 — 눈치상사</title>
<meta name="description" content="눈치상사 개발을 후원합니다. 국내·해외 결제 방법을 고를 수 있습니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --bg-soft:#F6F4F0; --ink:#202124; --ink-soft:#5F6368;
    --line:#E4E1DC; --accent:#FF5A3C; --accent-dark:#E03E20;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Gowun Dodum',sans-serif; background:var(--bg); color:var(--ink); line-height:1.6}
  h1,h2,.jua{font-family:'Jua',sans-serif; font-weight:400}
  a{color:var(--accent-dark)}
  nav{display:flex; align-items:center; gap:20px; padding:16px 32px; border-bottom:1px solid var(--line)}
  .logo{font-family:'Jua'; font-size:1.3rem; text-decoration:none; color:var(--ink)}
  .nav-spacer{flex:1}
  .lang-btn{background:none;border:none;cursor:pointer;font-family:'Jua';font-size:.9rem;color:var(--ink-soft);padding:6px 12px;border-radius:999px}
  .lang-btn.active{color:var(--accent-dark)}
  .wrap{max-width:560px; margin:0 auto; padding:52px 24px 80px; text-align:center}
  h1{font-size:clamp(1.6rem,4vw,2.3rem); margin-bottom:10px}
  .sub{color:var(--ink-soft); margin-bottom:36px}

  .opts{display:flex; flex-direction:column; gap:14px; text-align:left}
  .opt{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    background:var(--bg-soft); border:1.5px solid var(--line); border-radius:16px;
    padding:18px 20px; transition:border-color .12s, transform .12s;
  }
  .opt:hover{border-color:var(--accent); transform:translateY(-2px)}
  .opt .ico{font-size:1.9rem; flex-shrink:0; width:44px; text-align:center}
  .opt .txt b{font-family:'Jua'; font-weight:400; font-size:1.08rem; display:block}
  .opt .txt small{color:var(--ink-soft); font-size:.86rem}
  .opt .arrow{margin-left:auto; color:var(--ink-soft); flex-shrink:0}

  /* 준비 중인 후원처 — 링크가 아니라 안내 */
  .opt.soon{opacity:.6; cursor:default}
  .opt.soon:hover{border-color:var(--line); transform:none}

  .note{background:var(--bg-soft); border-radius:12px; padding:14px 16px; font-size:.82rem; color:var(--ink-soft); margin-top:30px; text-align:left}
  .note b{color:var(--ink); font-family:'Jua'; font-weight:400}
  .back{display:inline-block; margin-top:26px; text-decoration:none; font-family:'Jua'}
</style>
</head>
<body>
  <nav>
    <a class="logo" href="./index.html">눈치상사</a>
    <span class="nav-spacer"></span>
    <button class="lang-btn active" data-lang="ko">KO</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </nav>

  <div class="wrap">
    <h1 data-i18n="h1">☕ 개발을 후원해 주세요</h1>
    <p class="sub" data-i18n="sub">눈치상사는 무료입니다. 후원은 개발과 Windows 버전 작업에 쓰입니다.</p>

    <div class="opts">
      <!-- 해외 결제 (Ko-fi) -->
      <a class="opt" href="https://ko-fi.com/nunchiboss" target="_blank" rel="noopener noreferrer">
        <span class="ico">☕</span>
        <span class="txt">
          <b data-i18n="kofi_t">Ko-fi</b>
          <small data-i18n="kofi_d">해외 카드·PayPal · 단발 후원</small>
        </span>
        <span class="arrow">→</span>
      </a>

      <!-- 국내 결제 — 준비되면 아래 주석을 링크로 교체 (a.opt, href 지정, soon 클래스 제거) -->
      <div class="opt soon">
        <span class="ico">🇰🇷</span>
        <span class="txt">
          <b data-i18n="kr_t">국내 결제</b>
          <small data-i18n="kr_d">카드·간편결제 · 준비 중입니다</small>
        </span>
      </div>
    </div>

    <div class="note">
      <b data-i18n="n_title">알아두실 점</b><br>
      <span data-i18n="n_body">후원은 <b>전적으로 외부 결제 페이지</b>에서 이뤄집니다. 앱은 결제를 처리하지 않으며, 후원 버튼은 브라우저를 열 뿐입니다 — <b>앱은 여전히 아무것도 외부로 전송하지 않습니다.</b> 후원은 대가 없는 자발적 지원이며, 후원 여부와 관계없이 모든 기능을 무료로 쓸 수 있습니다.</span>
    </div>

    <a class="back" href="./index.html" data-i18n="back">← 눈치상사로 돌아가기</a>
  </div>

<script>
  const EN = {
    h1:'☕ Support development', sub:'NunchiBoss is free. Your support funds development and the Windows version.',
    kofi_t:'Ko-fi', kofi_d:'International cards · PayPal · one-time',
    kr_t:'Korean payment', kr_d:'Cards & local wallets · coming soon',
    n_title:'Good to know',
    n_body:'Payment happens <b>entirely on an external page</b>. The app never processes payments — the button only opens your browser, and <b>the app still sends nothing over the network.</b> Support is voluntary with nothing owed in return; every feature stays free whether you donate or not.',
    back:'← Back to NunchiBoss'
  };
  const KO = {};
  document.querySelectorAll('[data-i18n]').forEach(el=>KO[el.dataset.i18n]=el.innerHTML);
  const TITLES={ko:document.title, en:'Support — NunchiBoss'};
  let lang = localStorage.getItem('sajoe_lang') || 'ko';
  const t = k => (lang==='en' && EN[k]!==undefined) ? EN[k] : KO[k];
  function setLang(l){
    lang=l; localStorage.setItem('sajoe_lang',l); document.documentElement.lang=l;
    document.title=TITLES[l]||TITLES.ko;
    document.querySelectorAll('[data-i18n]').forEach(el=>{ el.innerHTML = t(el.dataset.i18n); });
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  }
  document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
  if(lang!=='ko') setLang(lang);
</script>
</body>
</html>
